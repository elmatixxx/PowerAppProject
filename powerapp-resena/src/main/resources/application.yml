server:
  port: 8087

spring:
  application:
    name: powerapp-resena
  datasource:
    url: jdbc:postgresql://localhost:5432/powerapp_resena
    username: powerapp
    password: powerapp
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

management:
  endpoints:
    web:
      exposure:
        include: health,info
